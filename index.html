<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Flip</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">


    <style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0a0a1a;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #gf-wrap {
  display: flex;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  }
  #hud { display: none; }
  #gf-hint { display: none; }
  #gf-canvas {
  display: block;
  cursor: pointer;
  width: 100vw;
  height: 100vh;
}
    </style>

  </head>
  <body>
    <div id="gf-wrap">
      <div id="hud">
        <div class="hud-box"><div class="hud-label">score</div><div class="hud-val" id="gf-score">0</div></div>
        <div class="hud-box"><div class="hud-label">best</div><div class="hud-val" id="gf-best">0</div></div>
        <div class="hud-box"><div class="hud-label">speed</div><div class="hud-val" id="gf-speed">1x</div></div>
      </div>
      <canvas id="gf-canvas"></canvas>
      <div id="gf-hint">tap · click · spacebar to flip gravity</div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
